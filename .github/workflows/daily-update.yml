name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 07:00 JST (= 22:00 UTC)
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # dashboard.html を push するために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests -q

      - name: Update DAILY_DATA in dashboard.html
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python scripts/update_daily.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')"
            git push
          fi
