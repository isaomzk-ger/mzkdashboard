name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST (= 21:00 UTC)
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytest -q

      # ── Step 1: Pre-flight check ─────────────────────────────────────────
      - name: Pre-flight — Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests, sys
          token = os.environ["NOTION_TOKEN"]
          try:
              resp = requests.post(
                  "https://api.notion.com/v1/search",
                  headers={"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"},
                  json={"page_size": 1},
                  timeout=10,
              )
              resp.raise_for_status()
              print("✅ Notion OK")
          except Exception as e:
              print(f"❌ Notion pre-flight failed: {e}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Pre-flight — Google Calendar
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests, sys
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          try:
              r = requests.post(
                  "https://oauth2.googleapis.com/token",
                  data={
                      "client_id":     os.environ["GOOGLE_CLIENT_ID"],
                      "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
                      "refresh_token": os.environ["GOOGLE_REFRESH_TOKEN"],
                      "grant_type":    "refresh_token",
                  },
                  timeout=10,
              )
              r.raise_for_status()
              access_token = r.json()["access_token"]
              now = datetime.now(JST)
              r2 = requests.get(
                  "https://www.googleapis.com/calendar/v3/calendars/primary/events",
                  headers={"Authorization": f"Bearer {access_token}"},
                  params={
                      "timeMin": now.replace(hour=0, minute=0, second=0, microsecond=0).isoformat(),
                      "timeMax": now.replace(hour=23, minute=59, second=59, microsecond=0).isoformat(),
                      "maxResults": 1,
                      "singleEvents": "true",
                  },
                  timeout=10,
              )
              r2.raise_for_status()
              print("✅ Google Calendar OK")
          except Exception as e:
              print(f"❌ Calendar pre-flight failed: {e}", file=sys.stderr)
              print("→ GCP で Calendar API が有効か、GOOGLE_REFRESH_TOKEN を確認してください", file=sys.stderr)
              sys.exit(1)
          EOF

      # ── Step 2: Update + Test with reflection loop (最大 3 回) ────────────
      - name: Update dashboard (attempt 1)
        id: update1
        continue-on-error: true
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python scripts/update_daily.py

      - name: Run tests (attempt 1)
        id: test1
        if: steps.update1.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pytest tests/dashboard_invariants.py -v 2>&1 | tee /tmp/test_output.txt
          exit ${PIPESTATUS[0]}

      # ── リフレクション 1回目 ─────────────────────────────────────────────
      - name: Diagnose & fix (attempt 2)
        id: fix2
        if: steps.update1.outcome == 'failure' || steps.test1.outcome == 'failure'
        continue-on-error: true
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          echo "=== 失敗ログ ===" && cat /tmp/test_output.txt 2>/dev/null || true
          echo "=== 根本原因を特定して再実行 ==="
          # Notion API コール数が 15 を超えていないか確認
          python - <<'EOF'
          import re, pathlib, sys
          log = pathlib.Path("/tmp/test_output.txt").read_text() if pathlib.Path("/tmp/test_output.txt").exists() else ""
          issues = []
          if "NOTION_TOKEN" in log or "401" in log:
              issues.append("Notion 認証エラー — NOTION_TOKEN シークレットを確認")
          if "Calendar" in log or "403" in log:
              issues.append("Calendar API エラー — GCP で API が有効か確認")
          if "今日" in log or "today" in log.lower():
              issues.append("日付不一致 — タイムゾーン処理を確認")
          if "empty" in log.lower() or "tasks が空" in log:
              issues.append("タスク空 — Notion DB ID と フィルター条件を確認")
          if issues:
              print("診断結果:", file=sys.stderr)
              for i in issues: print(f"  ⚠️  {i}", file=sys.stderr)
          else:
              print("原因特定できず — update_daily.py を再実行します", file=sys.stderr)
          EOF
          python scripts/update_daily.py

      - name: Run tests (attempt 2)
        id: test2
        if: steps.fix2.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pytest tests/dashboard_invariants.py -v 2>&1 | tee /tmp/test_output.txt
          exit ${PIPESTATUS[0]}

      # ── リフレクション 2回目 ─────────────────────────────────────────────
      - name: Diagnose & fix (attempt 3)
        id: fix3
        if: steps.fix2.outcome == 'failure' || steps.test2.outcome == 'failure'
        continue-on-error: true
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          echo "=== 2回目失敗 — 最終診断 ===" && cat /tmp/test_output.txt 2>/dev/null || true
          python scripts/update_daily.py

      - name: Run tests (attempt 3 — final)
        id: test3
        if: steps.fix3.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pytest tests/dashboard_invariants.py -v 2>&1 | tee /tmp/test_output.txt
          exit ${PIPESTATUS[0]}

      # ── 最終失敗時: Notion にタスクを作成 ────────────────────────────────
      - name: Notify failure to Notion
        if: |
          (steps.update1.outcome == 'failure' && steps.fix2.outcome == 'failure' && steps.fix3.outcome == 'failure') ||
          (steps.test1.outcome  == 'failure' && steps.test2.outcome  == 'failure' && steps.test3.outcome  == 'failure')
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          FAILURE_LOG=$(cat /tmp/test_output.txt 2>/dev/null || echo "テストログなし — update_daily.py 自体が失敗")
          python scripts/notify_failure.py "$FAILURE_LOG"
          exit 1

      # ── 成功時: commit & push ──────────────────────────────────────────────
      - name: Commit and push
        if: |
          steps.update1.outcome == 'success' && steps.test1.outcome == 'success' ||
          steps.fix2.outcome    == 'success' && steps.test2.outcome == 'success' ||
          steps.fix3.outcome    == 'success' && steps.test3.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "変更なし — スキップ"
          else
            git commit -m "Daily update $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')"
            git push
          fi
