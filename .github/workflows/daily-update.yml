name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST (= 21:00 UTC)
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytest -q

      # ── Pre-flight check ─────────────────────────────────────────────────
      - name: Pre-flight — Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests, sys
          token = os.environ["NOTION_TOKEN"]
          try:
              resp = requests.post(
                  "https://api.notion.com/v1/search",
                  headers={"Authorization": f"Bearer {token}", "Notion-Version": "2022-06-28", "Content-Type": "application/json"},
                  json={"page_size": 1},
                  timeout=10,
              )
              resp.raise_for_status()
              print("✅ Notion OK")
          except Exception as e:
              print(f"❌ Notion pre-flight failed: {e}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Pre-flight — Google Calendar
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests, sys
          try:
              r = requests.post(
                  "https://oauth2.googleapis.com/token",
                  data={
                      "client_id":     os.environ["GOOGLE_CLIENT_ID"],
                      "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
                      "refresh_token": os.environ["GOOGLE_REFRESH_TOKEN"],
                      "grant_type":    "refresh_token",
                  },
                  timeout=10,
              )
              r.raise_for_status()
              print("✅ Google Calendar OK")
          except Exception as e:
              print(f"❌ Calendar pre-flight failed: {e}", file=sys.stderr)
              print("→ GCP で Calendar API が有効か、GOOGLE_REFRESH_TOKEN を確認してください", file=sys.stderr)
              sys.exit(1)
          EOF

      # ── Update + Test (リトライループ、最大 10 回 × 5 分間隔) ─────────────
      - name: Update dashboard with retry loop
        id: update_loop
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          MAX_ATTEMPTS=10
          WAIT_SEC=300   # 5 分

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo ""
            echo "════════════════════════════════════"
            echo "  Attempt $attempt / $MAX_ATTEMPTS"
            echo "════════════════════════════════════"

            if python scripts/update_daily.py \
               && python -m pytest tests/dashboard_invariants.py -v 2>&1 | tee /tmp/test_output.txt \
               && [ "${PIPESTATUS[0]}" -eq 0 ]; then
              echo "✅ Succeeded on attempt $attempt"
              echo "succeeded=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "❌ Attempt $attempt failed."
            cat /tmp/test_output.txt 2>/dev/null || true

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "⏳ Waiting ${WAIT_SEC}s before next attempt…"
              sleep "$WAIT_SEC"
            fi
          done

          echo "❌ All $MAX_ATTEMPTS attempts failed."
          echo "succeeded=false" >> "$GITHUB_OUTPUT"
          exit 1

      # ── 全失敗時: Notion にタスクを作成 ─────────────────────────────────
      - name: Notify failure to Notion
        if: steps.update_loop.outcome == 'failure'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          FAILURE_LOG=$(cat /tmp/test_output.txt 2>/dev/null || echo "テストログなし — update_daily.py 自体が失敗")
          python scripts/notify_failure.py "$FAILURE_LOG"

      # ── 成功時: commit & push ─────────────────────────────────────────────
      - name: Commit and push
        if: steps.update_loop.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "変更なし — スキップ"
          else
            git commit -m "Daily update $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M')"
            git push
          fi
